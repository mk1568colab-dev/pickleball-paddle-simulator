services:
  - type: web
    name: pickleball-paddle-simulator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_streamlit.py
    envVars:
      - key: SIMULATOR_DB_PATH
        value: /var/data/simulator.db
    disk:
      name: simulator-data
      mountPath: /var/data
      sizeGB: 1
